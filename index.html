<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clademir Bertol - Elétrica & Serviços</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- BARRA SUPERIOR CORPORATIVA -->
    <header class="top-navbar">
        <div class="nav-brand">
            <!-- Certifique-se de que o arquivo enviado se chama logo-pai.png -->
            <img src="./logo-pai.png" alt="Logo Clademir Bertol" class="logo-img">
            <div class="nav-titles">
                <h1>Clademir Bertol</h1>
                <p>Elétrica & Prestação de Serviços</p>
            </div>
        </div>
        <div class="nav-badge">
            <i class="fa-solid fa-bolt"></i> Sistema Ativo
        </div>
    </header>

    <div class="container">

        <!-- BALÃO 1: DIMENSIONAMENTO DE CABOS -->
        <div class="balao">
            <h2><i class="fa-solid fa-calculator"></i> Calculadora de Cabos & Disjuntores</h2>
            <div class="form-group">
                <label for="inputAmperes">Corrente do Circuito (Amperes - A):</label>
                <input type="number" id="inputAmperes" placeholder="Ex: 20">
            </div>
            <button id="btnCalcularCabo">Calcular Material</button>
            <div id="resultadoCabo" class="resultado-box" style="display:none;"></div>
        </div>

        <!-- BALÃO 2: APOSTILA INTERATIVA / GUIAS -->
        <div class="balao">
            <h2><i class="fa-solid fa-book-open"></i> Guia Técnico & Explicações</h2>
            <div class="form-group">
                <label for="selectLigacao">Selecione o Tipo de Instalação:</label>
                <select id="selectLigacao">
                    <option value="">-- Escolha uma opção --</option>
                    <option value="monofasico">Monofásico (1F + N)</option>
                    <option value="bifasico">Bifásico (2F + N)</option>
                    <option value="trifasico">Trifásico (3F + N)</option>
                    <option value="estrela-triangulo">Partida Estrela-Triângulo (Motores)</option>
                </select>
            </div>
            <div id="resultadoExplicacao" class="explicacao">Selecione um item acima para ver o resumo prático e o "porquê" técnico.</div>
        </div>

        <!-- BALÃO 3: REGISTRO DE ORÇAMENTO (GOOGLE SHEETS) -->
        <div class="balao" style="border-left-color: #3b82f6;">
            <h2><i class="fa-solid fa-file-invoice-dollar"></i> Novo Orçamento / Cliente</h2>
            <form id="formOrcamento">
                <div class="form-group">
                    <label>Nome do Cliente:</label>
                    <input type="text" id="clienteNome" required placeholder="Nome completo ou empresa">
                </div>
                <div class="form-group">
                    <label>Descrição do Serviço:</label>
                    <textarea id="servicoDesc" rows="2" required placeholder="Ex: Instalação de Quadro de Distribuição"></textarea>
                </div>
                <div class="form-group">
                    <label>Valor Total (R$):</label>
                    <input type="number" step="0.01" id="valorTotal" required placeholder="0.00">
                </div>
                <button type="submit" style="background-color: #2563eb;" id="btnSalvar">Salvar na Planilha</button>
            </form>
            <div id="statusEnvio" class="resultado-box" style="display:none;"></div>
        </div>

    </div>

    <!-- Script Principal Modularizado -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
