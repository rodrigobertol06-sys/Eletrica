<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clademir Bertol - Elétrica & Serviços</title>
    <link rel="manifest" href="./manifest.json">
    <!-- Ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link para o novo arquivo CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <!-- Substitua 'logo.png' pelo nome exato do arquivo da sua imagem (image_7.png) -->
        <img src="./logo.png" alt="Logo Clademir Bertol" class="logo-img">
        <p>Orçamentos Rápidos & Apoio Técnico em Campo</p>
    </header>

    <!-- BALÃO 1: DIMENSIONAMENTO DE CABOS -->
    <div class="balao">
        <h2><i class="fa-solid fa-bolt"></i> Calculadora de Cabos e Disjuntores</h2>
        <div class="form-group">
            <label for="inputAmperes">Corrente do Circuito (Amperes - A):</label>
            <input type="number" id="inputAmperes" placeholder="Ex: 25">
        </div>
        <button id="btnCalcularCabo" class="btn-principal">Calcular Material</button>
        <div id="resultadoCabo" class="resultado-box" style="display:none;"></div>
    </div>

    <!-- BALÃO 2: TIPOS DE LIGAÇÃO E APOSTILA INTERATIVA -->
    <div class="balao">
        <h2><i class="fa-solid fa-book-reader"></i> Guia Técnico Interativo</h2>
        <div class="form-group">
            <label for="selectLigacao">Selecione o Tipo de Ligação:</label>
            <select id="selectLigacao">
                <option value="">-- Escolha uma opção --</option>
                <option value="monofasico">Monofásico (1F + N)</option>
                <option value="bifasico">Bifásico (2F + N)</option>
                <option value="trifasico">Trifásico (3F + N)</option>
                <option value="estrela-triangulo">Partida Estrela-Triângulo</option>
            </select>
        </div>
        <div id="resultadoExplicacao" class="explicacao">Selecione um item acima para ver a explicação técnica simplificada.</div>
    </div>

    <!-- BALÃO 3: REGISTRO DE ORÇAMENTO (GOOGLE SHEETS) -->
    <div class="balao balao-orcamento">
        <h2><i class="fa-solid fa-file-invoice-dollar"></i> Novo Orçamento / Cliente</h2>
        <form id="formOrcamento">
            <div class="form-group">
                <label>Nome do Cliente:</label>
                <input type="text" id="clienteNome" required placeholder="Nome ou Razão Social">
            </div>
            <div class="form-group">
                <label>Descrição do Serviço:</label>
                <textarea id="servicoDesc" rows="3" required placeholder="Breve descrição do trabalho"></textarea>
            </div>
            <div class="form-group">
                <label>Valor Total (R$):</label>
                <input type="number" step="0.01" id="valorTotal" required placeholder="0.00">
            </div>
            <button type="submit" class="btn-principal btn-salvar" id="btnSalvar">Salvar na Planilha</button>
        </form>
        <div id="statusEnvio" class="resultado-box" style="display:none; background-color: #d4edda; border-color: #c3e6cb;"></div>
    </div>

    <!-- Scripts JS Modularizados (Não mudam) -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
