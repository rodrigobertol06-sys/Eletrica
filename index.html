<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção Grupo TBX - Elétrica & Serviços</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0b132b;
            --accent: #3a86ff;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #2b2d42;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.4rem; color: var(--primary); }
        header p { font-size: 0.9rem; color: #666; }
        
        .balao {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent);
        }
        .balao h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem;
        }
        button {
            background-color: var(--accent); color: white; border: none; padding: 12px; width: 100%;
            border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 5px;
        }
        button:active { opacity: 0.8; }
        .resultado-box {
            background: #eef4ff; border-radius: 6px; padding: 12px; margin-top: 12px; font-size: 0.9rem;
            border: 1px dashed var(--accent);
        }
        .explicacao { font-size: 0.85rem; color: #555; margin-top: 6px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-bolt"></i> Auxiliar Elétrico TBX</h1>
        <p>Orçamentos, Dimensionamento e Apostila Interativa</p>
    </header>

    <!-- BALÃO 1: DIMENSIONAMENTO DE CABOS -->
    <div class="balao">
        <h2><i class="fa-solid fa-calculator"></i> Calculadora de Cabos & Disjuntores</h2>
        <div class="form-group">
            <label for="inputAmperes">Corrente do Circuito (Amperes - A):</label>
            <input type="number" id="inputAmperes" placeholder="Ex: 18">
        </div>
        <button id="btnCalcularCabo">Calcular Material</button>
        <div id="resultadoCabo" class="resultado-box" style="display:none;"></div>
    </div>

    <!-- BALÃO 2: TIPOS DE LIGAÇÃO E EXPLICAÇÃO TÉCNICA -->
    <div class="balao">
        <h2><i class="fa-solid fa-book-open"></i> Guia Técnico & Explicações</h2>
        <div class="form-group">
            <label for="selectLigacao">Selecione o Tipo de Instalação:</label>
            <select id="selectLigacao">
                <option value="">-- Escolha uma opção --</option>
                <option value="monofasico">Monofásico (1F + N)</option>
                <option value="bifasico">Bifásico (2F + N)</option>
                <option value="trifasico">Trifásico (3F + N)</option>
                <option value="estrela-triangulo">Partida Estrela-Triângulo (Motores)</option>
            </select>
        </div>
        <div id="resultadoExplicacao" class="explicacao">Selecione um item acima para ver o resumo prático e o "porquê" técnico.</div>
    </div>

    <!-- BALÃO 3: REGISTRO DE ORÇAMENTO (GOOGLE SHEETS) -->
    <div class="balao" style="border-left-color: #2a9d8f;">
        <h2><i class="fa-solid fa-file-invoice-dollar"></i> Novo Orçamento / Cliente</h2>
        <form id="formOrcamento">
            <div class="form-group">
                <label>Nome do Cliente:</label>
                <input type="text" id="clienteNome" required placeholder="Nome completo ou empresa">
            </div>
            <div class="form-group">
                <label>Descrição do Serviço:</label>
                <input type="text" id="servicoDesc" required placeholder="Ex: Instalação de Quadro de Distribuição">
            </div>
            <div class="form-group">
                <label>Valor Total (R$):</label>
                <input type="number" step="0.01" id="valorTotal" required placeholder="0.00">
            </div>
            <button type="submit" style="background-color: #2a9d8f;" id="btnSalvar">Salvar na Planilha</button>
        </form>
        <div id="statusEnvio" class="resultado-box" style="display:none;"></div>
    </div>

    <!-- Chamada do Script Principal Modularizado -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
